name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile dats
        run: bun ./compilers/compile-dats.js

      - name: Compile switch
        run: bun ./compilers/compile-switch.js

      - name: Compile discord-execs
        run: bun ./compilers/compile-discord-execs.js

      - name: Compile wine-execs
        run: bun ./compilers/compile-wine-execs.js

      - name: Compile all-execs
        run: bun ./compilers/compile-all-execs.js

      - name: Build launchbox gamesdb submodule
        run: cd ./libretro-roms-scraper && bun install && bun run index.js

      - name: Compile launchbox gamesdb
        run: bun ./compilers/compile-launchbox-gamesdb.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
